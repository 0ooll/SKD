name: Auto Sign
on:
  schedule:
    - cron: '1 17 * * *'  # 北京时间每天凌晨1点01分执行
  workflow_dispatch:  # 允许手动触发运行

jobs:
  sign-job:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5  # 从 v4 升级到 v5（支持 Node.js 24）

      - name: 设置 Python 环境
        uses: actions/setup-python@v6  # 从 v5 升级到 v6（支持 Node.js 24）
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行签到
        env:
          TOKEN: ${{ secrets.TOKEN }}
          SC3_SENDKEY: ${{ secrets.SC3_SENDKEY }}
          SC3_UID: ${{ secrets.SC3_UID }}
          EXIT_WHEN_FAIL: on
        run: python src/main.py  # 这里改成了 src/main.py
